<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI LoL Coach</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div class="langbar"><select id="lang" class="field lang" aria-label="Language"></select></div>
      <h1>AI LoL Coach</h1>
      <p class="tag" data-i18n="tagline" data-i18n-html>Reads your last 20 ranked games and tells you the 3 things <em>you</em> should fix.</p>
    </header>

    <nav class="mainnav">
      <a href="/" class="navbtn active" data-i18n="navHome">Home</a>
      <a href="/live.html" class="navbtn" data-i18n="navBot">Live Bot</a>
    </nav>

    <div id="launcherBar" class="launcher-bar" hidden>
      <span class="lb-status"><span class="dot on"></span><span id="lbGame"></span></span>
      <button id="lbWidget" class="navbtn lb-btn" type="button"></button>
    </div>

    <p id="keyWarn" class="error key-warn" hidden></p>

    <form id="form" class="controls" autocomplete="off">
      <input id="riotId" class="field" type="text" placeholder="Name#TAG  (e.g. Faker#KR1)" data-i18n-ph="placeholder" required />
      <select id="region" class="field region"></select>
      <button id="save" class="btn-star" type="button" data-i18n-title="saveTip" title="Save">★</button>
      <button id="go" class="btn" type="submit" data-i18n="analyze">Analyze</button>
    </form>

    <div id="saved" class="saved" hidden></div>

    <section id="news" class="card news" hidden>
      <div class="news-head">
        <h3 data-i18n="newsTitle">League news</h3>
        <a id="newsLink" class="link" target="_blank" rel="noopener" data-i18n="more">More</a>
      </div>
      <div id="newsBody"></div>
    </section>

    <p id="error" class="error" hidden></p>

    <section id="loading" class="loading" hidden>
      <div class="spinner"></div>
      <p id="loadingText">reading your games…</p>
    </section>

    <section id="results" hidden>
      <!-- Summary -->
      <div class="card summary">
        <div class="summary-top">
          <div>
            <h2 id="playerName"></h2>
            <p id="playerRank" class="muted"></p>
          </div>
          <div class="wr">
            <span id="wrValue" class="wr-num"></span>
            <span class="wr-label"><span data-i18n="wrLabel">win rate · last</span> <span id="wrGames"></span></span>
          </div>
        </div>
        <div id="mainChamps" class="champs"></div>
        <div id="progressBox" hidden>
          <p class="progress-label muted"><span data-i18n="progressTitle">Progress</span>:</p>
          <div id="progressChips" class="champs"></div>
        </div>
        <p id="roleNote" class="mix-note" hidden></p>
      </div>

      <!-- The core: 3 things to fix -->
      <div class="card fixes">
        <h3 data-i18n="fixesTitle">Your 3 things to fix</h3>
        <div id="chips" class="chips"></div>
        <div id="coachText" class="coach"></div>
        <p id="coachSource" class="source muted"></p>
      </div>

      <!-- Game list -->
      <div class="card games">
        <button id="gamesToggle" class="games-toggle" type="button">
          <span><span data-i18n="lastPre">Last</span> <span id="gamesCount"></span> <span data-i18n="lastPost">games</span></span> <span class="chev">▾</span>
        </button>
        <div id="gamesList" class="games-list" hidden></div>
      </div>
    </section>

    <footer class="foot muted" data-i18n="footer">Official Riot API · post-game coaching only · not affiliated with Riot Games</footer>
  </main>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
