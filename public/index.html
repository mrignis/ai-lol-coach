<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI LoL Coach</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <h1>AI LoL Coach</h1>
      <p class="tag">Reads your last 20 ranked games and tells you the 3 things <em>you</em> should fix.</p>
    </header>

    <form id="form" class="controls" autocomplete="off">
      <input id="riotId" class="field" type="text" placeholder="Name#TAG  (e.g. Faker#KR1)" required />
      <select id="region" class="field region"></select>
      <button id="go" class="btn" type="submit">Analyze</button>
    </form>

    <p id="error" class="error" hidden></p>

    <section id="loading" class="loading" hidden>
      <div class="spinner"></div>
      <p id="loadingText">reading your games…</p>
    </section>

    <section id="results" hidden>
      <!-- Summary -->
      <div class="card summary">
        <div class="summary-top">
          <div>
            <h2 id="playerName"></h2>
            <p id="playerRank" class="muted"></p>
          </div>
          <div class="wr">
            <span id="wrValue" class="wr-num"></span>
            <span class="wr-label">win rate · last <span id="wrGames"></span></span>
          </div>
        </div>
        <div id="mainChamps" class="champs"></div>
        <p id="roleNote" class="mix-note" hidden></p>
      </div>

      <!-- The core: 3 things to fix -->
      <div class="card fixes">
        <h3>Your 3 things to fix</h3>
        <div id="chips" class="chips"></div>
        <div id="coachText" class="coach"></div>
        <p id="coachSource" class="source muted"></p>
      </div>

      <!-- Game list -->
      <div class="card games">
        <button id="gamesToggle" class="games-toggle" type="button">
          Last <span id="gamesCount"></span> games <span class="chev">▾</span>
        </button>
        <div id="gamesList" class="games-list" hidden></div>
      </div>
    </section>

    <footer class="foot muted">Official Riot API · post-game coaching only · not affiliated with Riot Games</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
