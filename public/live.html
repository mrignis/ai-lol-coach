<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Companion · AI LoL Coach</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div class="langbar"><select id="lang" class="field lang" aria-label="Language"></select></div>
      <h1 data-i18n="liveTitle">Live Companion</h1>
      <p class="tag" data-i18n="liveTagline" data-i18n-html>In-game nudges from the official Live Client Data API · <em>informational only</em></p>
    </header>

    <nav class="mainnav">
      <a href="/" class="navbtn" data-i18n="navHome">Home</a>
      <a href="/live.html" class="navbtn active" data-i18n="navBot">Live Bot</a>
    </nav>

    <div class="live-bar">
      <label class="muted" for="bucket" data-i18n="rankTier">Your rank tier:</label>
      <select id="bucket" class="field">
        <option value="low" data-i18n="tierLow">Iron–Silver</option>
        <option value="mid" selected data-i18n="tierMid">Gold–Plat</option>
        <option value="high" data-i18n="tierHigh">Emerald+</option>
      </select>
      <span id="dot" class="dot off" title="connection"></span>
    </div>

    <div id="status" class="card status" data-i18n="waiting">Waiting for a game… launch League and load into a match.</div>

    <div id="widget" hidden>
      <div class="card live-me">
        <div class="live-top">
          <span id="liveChamp" class="live-champ"></span>
          <span id="liveTime" class="muted"></span>
        </div>
        <div id="liveStats" class="live-stats"></div>
      </div>
      <div class="card">
        <h3 data-i18n="rightNow">Right now</h3>
        <div id="liveNudges" class="live-nudges"></div>
      </div>
    </div>

    <footer class="foot muted">
      <a href="/" class="link" data-i18n="backLink">← post-game analysis</a> ·
      <span data-i18n="liveFooter">ToS-safe: read-only, no automation. Show this on a 2nd monitor or in windowed mode.</span>
    </footer>
  </main>
  <script src="i18n.js"></script>
  <script src="live.js"></script>
</body>
</html>
